<svg viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">
  <title>A better dictation tool — Same key, Multilingual, Verbatim</title>
  <desc>The F5 key on a Mac keyboard function row is highlighted with a small microphone icon; a centered caption reads "A better dictation tool" and, on one line, "Same key · Multilingual · Verbatim".</desc>

  <rect width="1200" height="460" fill="#f4f6fa"/>

  <text x="600" y="112" text-anchor="middle" font-size="64" font-weight="700" fill="#111318">A better dictation tool.</text>

  <text x="600" y="170" text-anchor="middle" font-size="31" font-weight="600">
    <tspan fill="#6366f1">Same key</tspan><tspan fill="#c3c9d4" dx="18">·</tspan><tspan fill="#6366f1" dx="18">Multilingual</tspan><tspan fill="#c3c9d4" dx="18">·</tspan><tspan fill="#6366f1" dx="18">Verbatim</tspan>
  </text>

  <rect x="60" y="216" width="1080" height="116" rx="24" fill="#e8ebf1"/>

  <g>
    <rect x="76" y="232" width="80" height="84" rx="13" fill="#ffffff" stroke="#d9dee7" stroke-width="1.5"/>
    <text x="116" y="282" text-anchor="middle" font-size="16" font-weight="500" fill="#9ca3af">F1</text>
