    <rect x="340" y="232" width="80" height="84" rx="13" fill="#ffffff" stroke="#d9dee7" stroke-width="1.5"/>
    <text x="380" y="282" text-anchor="middle" font-size="16" font-weight="500" fill="#9ca3af">F4</text>

    <rect x="423" y="227" width="90" height="94" rx="16" fill="none" stroke="#6366f1" stroke-width="3.5"/>
    <rect x="428" y="232" width="80" height="84" rx="13" fill="#111318"/>
    <rect x="460" y="250" width="16" height="19" rx="8" fill="#ffffff"/>
    <path d="M 455 267 a 13 13 0 0 0 26 0" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
