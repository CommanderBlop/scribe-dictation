<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif">
  <title>A better dictation tool — Same key, Multilingual, Verbatim</title>
  <desc>The F5 key on a Mac keyboard function row is highlighted with a small microphone icon; a centered caption reads "A better dictation tool" and, on one line, "Same key · Multilingual · Verbatim".</desc>

  <rect width="1200" height="630" fill="#f4f6fa"/>

  <text x="600" y="200" text-anchor="middle" font-size="60" font-weight="700" fill="#111318">A better dictation tool.</text>

  <text x="600" y="254" text-anchor="middle" font-size="29" font-weight="600">
    <tspan fill="#6366f1">Same key</tspan><tspan fill="#c3c9d4" dx="16">·</tspan><tspan fill="#6366f1" dx="16">Multilingual</tspan><tspan fill="#c3c9d4" dx="16">·</tspan><tspan fill="#6366f1" dx="16">Verbatim</tspan>
  </text>

  <rect x="108" y="298" width="984" height="106" rx="22" fill="#e8ebf1"/>

  <g>
